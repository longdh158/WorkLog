@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

.wl * { box-sizing: border-box; }
.wl {
  --canvas:#E8EAED; --paper:#FFFFFF; --ink:#0E1B27; --ink2:#42525F; --ink3:#7C8995;
  --line:#D7DCE1; --nav:#0E1B27; --navline:#243443;
  --teal:#0E6E64; --teal-d:#0A554D; --amber:#B96A0A; --red:#BE3A2B; --green:#1E7D4F; --blue:#2C5C88;
  --chip:#EEF1F3;
  font-family:'Inter',system-ui,sans-serif; color:var(--ink);
  background:var(--canvas); min-height:100vh; line-height:1.45;
  -webkit-font-smoothing:antialiased;
}
.mono { font-family:'IBM Plex Mono',ui-monospace,monospace; }

/* top bar */
.wl-top { background:var(--nav); color:#fff; border-bottom:1px solid var(--navline); }
.wl-top-in { max-width:1080px; margin:0 auto; padding:14px 20px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
.brand { display:flex; align-items:baseline; gap:10px; }
.brand .mark { font-family:'IBM Plex Mono',monospace; font-weight:600; letter-spacing:.28em; font-size:15px; }
.brand .sub { font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.14em; color:#7E93A4; text-transform:uppercase; }
.tabs { display:flex; gap:2px; margin-left:auto; flex-wrap:wrap; }
.tab { background:transparent; border:none; color:#90A2B1; font-family:'IBM Plex Mono',monospace;
  font-size:12px; letter-spacing:.06em; padding:8px 13px; border-radius:6px; cursor:pointer; transition:.15s; }
.tab:hover { color:#fff; background:#18293799; }
.tab.on { color:var(--ink); background:#fff; font-weight:600; }
.tab .ct { opacity:.6; margin-left:6px; }

/* layout */
.wrap { max-width:1080px; margin:0 auto; padding:22px 20px 60px; }
.head { display:flex; align-items:flex-end; justify-content:space-between; gap:14px; margin-bottom:16px; flex-wrap:wrap; }
.head h2 { font-size:21px; font-weight:700; letter-spacing:-.01em; margin:0; }
.head .desc { color:var(--ink3); font-size:13px; margin-top:3px; }

.btn { font-family:'Inter',sans-serif; font-weight:600; font-size:13px; border-radius:7px; padding:9px 15px;
  cursor:pointer; border:1px solid transparent; transition:.15s; display:inline-flex; align-items:center; gap:7px; }
.btn-pri { background:var(--teal); color:#fff; }
.btn-pri:hover { background:var(--teal-d); }
.btn-ghost { background:var(--paper); color:var(--ink); border-color:var(--line); }
.btn-ghost:hover { border-color:var(--ink3); }
.btn-sm { padding:6px 11px; font-size:12px; }
.btn-link { background:none; border:none; color:var(--teal); cursor:pointer; font-size:12px; font-weight:600; padding:4px 6px; }
.btn-link.red { color:var(--red); }

/* filter row */
.filters { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
.inp, .sel { font-family:'Inter',sans-serif; font-size:13px; padding:8px 10px; border:1px solid var(--line);
  border-radius:7px; background:var(--paper); color:var(--ink); }
.inp:focus, .sel:focus { outline:2px solid var(--teal); outline-offset:-1px; border-color:var(--teal); }
.search { flex:1; min-width:160px; }

/* logbook list */
.log { background:var(--paper); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
.row { display:flex; gap:14px; padding:14px 16px; border-top:1px solid var(--line); align-items:flex-start; }
.row:first-child { border-top:none; }
.row.done .r-title { color:var(--ink3); text-decoration:line-through; }
.r-main { flex:1; min-width:0; }
.r-title { font-weight:600; font-size:14.5px; margin:0 0 4px; word-break:break-word; }
.r-meta { display:flex; gap:8px; flex-wrap:wrap; align-items:center; font-size:11.5px; color:var(--ink3); }
.r-note { color:var(--ink2); font-size:13px; margin-top:6px; white-space:pre-wrap; word-break:break-word; }
.r-side { display:flex; flex-direction:column; align-items:flex-end; gap:7px; flex-shrink:0; }
.r-actions { display:flex; gap:2px; }

/* note entries (subtask log) */
.row.col { flex-direction:column; align-items:stretch; gap:0; }
.row-top { display:flex; gap:14px; align-items:flex-start; }
.ent-toggle { background:none; border:none; color:var(--teal); font-size:11.5px; font-weight:600; cursor:pointer; padding:0; }
.ent-toggle:hover { color:var(--teal-d); text-decoration:underline; }
.entries { margin:10px 0 2px 34px; padding-left:13px; border-left:2px solid var(--line); display:flex; flex-direction:column; gap:7px; }
.entry { display:flex; align-items:center; gap:9px; font-size:13px; }
.ent-time { font-size:10.5px; color:var(--ink3); flex-shrink:0; }
.ent-text { color:var(--ink); word-break:break-word; flex:1; }
.ent-thumb { width:38px; height:38px; object-fit:cover; border-radius:6px; border:1px solid var(--line); cursor:pointer; flex-shrink:0; }
.ent-thumb:hover { border-color:var(--teal); }
.ent-del { margin-left:auto; background:none; border:none; color:var(--ink3); cursor:pointer; font-size:16px; line-height:1; padding:0 4px; flex-shrink:0; }
.ent-del:hover { color:var(--red); }
.ent-compose { display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-top:3px; }
.ent-prechip { position:relative; display:inline-flex; }
.ent-prechip img { width:38px; height:38px; object-fit:cover; border-radius:6px; border:1px solid var(--line); }
.ent-prechip button { position:absolute; top:-7px; right:-7px; width:18px; height:18px; border-radius:50%; border:none;
  background:var(--ink); color:#fff; font-size:12px; line-height:1; cursor:pointer; }
.ent-prefile { font-size:11.5px; color:var(--ink2); padding:6px 8px; background:var(--chip); border-radius:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:160px; display:inline-block; }
.ent-file { display:inline-flex; align-items:center; gap:5px; background:var(--chip); border:1px solid var(--line); border-radius:7px;
  padding:5px 10px; font-size:12px; cursor:pointer; font-family:inherit; color:var(--ink2); max-width:220px; }
.ent-file:hover { border-color:var(--teal); background:#E7EEF0; }
.ent-ficon { font-size:16px; flex-shrink:0; }
.ent-fname { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500; color:var(--ink); }
.ent-fsize { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ink3); flex-shrink:0; }
.lightbox { position:fixed; inset:0; background:#0e1b27e0; display:flex; align-items:center; justify-content:center; z-index:70; padding:24px; }
.lightbox img { max-width:92vw; max-height:88vh; border-radius:8px; box-shadow:0 12px 40px #00000060; }
.lb-close { position:fixed; top:18px; right:22px; width:38px; height:38px; border-radius:50%; border:none;
  background:#ffffff22; color:#fff; font-size:22px; cursor:pointer; }
.lb-close:hover { background:#ffffff38; }

/* check */
.chk { width:20px; height:20px; border:1.7px solid var(--ink3); border-radius:6px; background:#fff; cursor:pointer;
  flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; transition:.12s; }
.chk:hover { border-color:var(--teal); }
.chk.on { background:var(--teal); border-color:var(--teal); }
.chk.on svg { display:block; }
.chk svg { display:none; }

/* chips */
.chip { font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.03em; padding:2.5px 7px;
  border-radius:5px; background:var(--chip); color:var(--ink2); white-space:nowrap; font-weight:500; }
.chip.cp { background:#E7EEF0; color:var(--teal-d); }
.dot { width:7px; height:7px; border-radius:50%; display:inline-block; }
.pri { display:inline-flex; align-items:center; gap:5px; font-family:'IBM Plex Mono',monospace; font-size:10.5px;
  font-weight:600; letter-spacing:.04em; padding:2.5px 7px; border-radius:5px; }
.stat { font-family:'IBM Plex Mono',monospace; font-size:10.5px; font-weight:600; letter-spacing:.03em;
  padding:2.5px 8px; border-radius:5px; }
.due-over { color:var(--red); font-weight:600; }
.due-soon { color:var(--amber); font-weight:600; }

/* empty */
.empty { padding:46px 20px; text-align:center; color:var(--ink3); }
.empty .big { font-size:15px; color:var(--ink2); font-weight:600; margin-bottom:4px; }

/* projects */
.proj-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
.proj-card { background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:16px 17px; cursor:pointer;
  transition:.15s; display:flex; flex-direction:column; gap:0; }
.proj-card:hover { border-color:var(--teal); box-shadow:0 4px 16px #0e1b2714; transform:translateY(-1px); }
.proj-card:focus-visible { outline:2px solid var(--teal); outline-offset:2px; }
.pc-top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:6px; }
.pc-name { font-size:15.5px; font-weight:700; margin:0; letter-spacing:-.01em; word-break:break-word; }
.pc-note { color:var(--ink3); font-size:12.5px; margin-bottom:11px; }
.pc-progress { display:flex; align-items:center; gap:9px; margin-top:auto; padding-top:11px; }
.pc-bar { flex:1; height:6px; border-radius:4px; background:#E3E7EB; overflow:hidden; }
.pc-bar span { display:block; height:100%; background:var(--teal); border-radius:4px; transition:width .3s; }
.pc-pct { font-size:11px; color:var(--ink2); font-weight:600; min-width:30px; text-align:right; }
.pc-meta { display:flex; align-items:center; gap:11px; margin-top:9px; font-size:11px; color:var(--ink3); }
.pc-open { margin-left:auto; color:var(--teal); font-weight:600; font-family:'IBM Plex Mono',monospace; font-size:11px; }
.back-link { background:none; border:none; color:var(--teal); font-weight:600; font-size:13px; cursor:pointer;
  padding:0 0 12px; display:inline-flex; align-items:center; }
.back-link:hover { color:var(--teal-d); }
.arch-row { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:9px 0; border-top:1px solid var(--line); }
.arch-row:first-of-type { border-top:none; }

/* dashboard */
.kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px; }
.kpi { background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:15px 16px; }
.kpi .n { font-family:'IBM Plex Mono',monospace; font-size:30px; font-weight:600; line-height:1; }
.kpi .l { font-size:11.5px; color:var(--ink3); margin-top:7px; letter-spacing:.02em; }
.kpi .bar { height:3px; border-radius:2px; margin-bottom:13px; }
.dash-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.panel { background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:16px 18px; }
.panel h3 { font-size:12px; font-family:'IBM Plex Mono',monospace; letter-spacing:.1em; text-transform:uppercase;
  color:var(--ink3); margin:0 0 12px; font-weight:600; }
.pitem { padding:9px 0; border-top:1px solid var(--line); font-size:13.5px; }
.pitem:first-of-type { border-top:none; }
.pitem .pm { font-size:11px; color:var(--ink3); font-family:'IBM Plex Mono',monospace; margin-top:2px; }
.report-bar { background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin-bottom:18px;
  display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; }
.report-bar .t { font-weight:600; font-size:14px; }
.report-bar .s { color:var(--ink3); font-size:12.5px; margin-top:2px; }

/* modal */
.ov { position:fixed; inset:0; background:#0e1b27aa; display:flex; align-items:flex-start; justify-content:center;
  padding:40px 16px; z-index:50; overflow:auto; }
.modal { background:var(--paper); border-radius:14px; width:100%; max-width:560px; padding:22px 24px 24px;
  box-shadow:0 24px 60px #0e1b2740; }
.modal h3 { margin:0 0 16px; font-size:17px; }
.frow { margin-bottom:13px; }
.frow.two { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
.lab { display:block; font-size:11.5px; font-weight:600; color:var(--ink2); margin-bottom:5px; letter-spacing:.01em; }
.fld { width:100%; font-family:'Inter',sans-serif; font-size:13.5px; padding:9px 11px; border:1px solid var(--line);
  border-radius:8px; background:#fff; color:var(--ink); }
.fld:focus { outline:2px solid var(--teal); outline-offset:-1px; border-color:var(--teal); }
textarea.fld { resize:vertical; min-height:62px; line-height:1.5; }
.m-actions { display:flex; justify-content:flex-end; gap:9px; margin-top:6px; }
.att-list { display:flex; flex-direction:column; gap:5px; margin-bottom:2px; }
.att-item { display:flex; align-items:center; gap:8px; padding:6px 8px; background:var(--chip); border-radius:7px; font-size:12.5px; }
.att-thumb { width:32px; height:32px; object-fit:cover; border-radius:5px; flex-shrink:0; }
.att-icon { font-size:18px; flex-shrink:0; width:32px; text-align:center; }
.att-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--ink); font-weight:500; }
.att-size { font-size:10px; color:var(--ink3); flex-shrink:0; }
.att-row { display:inline-flex; align-items:center; gap:5px; margin-top:6px; flex-wrap:wrap; }
.att-chip { display:inline-flex; align-items:center; gap:4px; background:var(--chip); border:1px solid var(--line);
  border-radius:6px; padding:4px 8px; font-size:11.5px; cursor:pointer; color:var(--ink2); text-decoration:none; }
.att-chip:hover { border-color:var(--teal); background:#E7EEF0; }
.att-chip img { width:22px; height:22px; object-fit:cover; border-radius:4px; }

.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff;
  padding:11px 18px; border-radius:9px; font-size:13px; font-weight:500; z-index:60; box-shadow:0 8px 24px #0e1b2750; }
.app-footer { max-width:1080px; margin:0 auto; padding:8px 20px 22px; display:flex; justify-content:space-between;
  align-items:center; font-family:'IBM Plex Mono',monospace; font-size:10px; color:#9AA6B0; letter-spacing:.03em; }
.app-footer a { color:#0E6E64; text-decoration:none; }
.app-footer a:hover { text-decoration:underline; }

@media (max-width:720px){
  .kpis{ grid-template-columns:repeat(2,1fr); }
  .dash-grid{ grid-template-columns:1fr; }
  .proj-grid{ grid-template-columns:1fr; }
  .tabs{ width:100%; margin-left:0; }
}
